# =============================================================================
# RFID QR Qualitätskontrolle - Electron Builder Konfiguration
# Spezialisiert für Doppel-Scan-System und Multi-User-Betrieb
# =============================================================================

# App Metadaten
appId: com.shirtful.rfid-qr-qualitaetskontrolle
productName: "RFID QR Qualitätskontrolle"
copyright: "Copyright © 2024 Shirtful GmbH"

# Verzeichnisse
directories:
  output: dist
  buildResources: build

# Dateien die in die App gepackt werden
files:
  - "main.js"
  - "preload.js"
  - "package.json"
  - "renderer/**/*"
  - "rfid/**/*"
  - "db/**/*"
  - "node_modules/**/*"
  - "!node_modules/*/{CHANGELOG.md,README.md,README,readme.md,readme}"
  - "!node_modules/*/{test,__tests__,tests,powered-test,example,examples}"
  - "!node_modules/*.d.ts"
  - "!node_modules/.bin"
  - "!**/*.{iml,o,hprof,orig,pyc,pyo,rbc,swp,csproj,sln,xproj}"
  - "!.editorconfig"
  - "!**/._*"
  - "!**/{.DS_Store,.git,.hg,.svn,CVS,RCS,SCCS,.gitignore,.gitattributes}"
  - "!**/{__pycache__,thumbs.db,.flowconfig,.idea,.vs,.nyc_output}"
  - "!**/{appveyor.yml,.travis.yml,circle.yml}"
  - "!**/{npm-debug.log,yarn.lock,.yarn-integrity,.yarn-metadata.json}"

# Extra Ressourcen
extraResources:
  - from: ".env.example"
    to: ".env.example"
  - from: "README.md"
    to: "README.md"
  - from: "docs/qualitaetskontrolle-handbuch.pdf"
    to: "docs/qualitaetskontrolle-handbuch.pdf"
    filter:
      - "**/*"

# Kompressionslevel
compression: normal

# Auto-Update Konfiguration (optional für zukünftige Versionen)
publish:
  provider: generic
  url: "https://updates.shirtful.com/rfid-qr-qualitaetskontrolle/"

# =============================================================================
# WINDOWS KONFIGURATION
# =============================================================================

win:
  target:
    - target: nsis
      arch:
        - x64
        - ia32
  icon: "build/icon.ico"
  requestedExecutionLevel: asInvoker
  certificateFile: null # Für Code-Signing falls gewünscht
  certificatePassword: null
  verifyUpdateCodeSignature: false

  # App Details
  legalTrademarks: "Shirtful GmbH"
  fileVersion: "1.0.0"
  productVersion: "1.0.0"

  # Qualitätskontrolle-spezifische Metadaten
  extraMetadata:
    qualitaetskontrolle:
      doubleScanSystem: true
      autoSessionRestart: true
      multiUserSupport: true
      version: "1.0.0"

# NSIS Installer Konfiguration
nsis:
  oneClick: false
  allowElevation: true
  allowToChangeInstallationDirectory: true
  installerIcon: "build/installer.ico"
  uninstallerIcon: "build/uninstaller.ico"
  installerHeaderIcon: "build/installerHeader.ico"
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: "RFID QR Qualitätskontrolle"

  # Installer Sprache
  language: "1031" # Deutsch

  # Installer Konfiguration
  artifactName: "${productName} Setup ${version}.${ext}"

  # Installationsverzeichnis
  warningsAsErrors: false

  # Uninstaller
  deleteAppDataOnUninstall: false

  # Multi-User Installation
  perMachine: false

  # License
  license: null # "build/license.txt" falls Lizenz-Datei vorhanden

  # Installer Seiten
  welcomeTitle: "Willkommen zum ${productName} Setup"
  welcomeText: "Dieses Setup installiert die RFID QR Qualitätskontrolle mit Doppel-Scan-System für präzise Karton-Bearbeitung."

  # Menuverzeichnis
  menuCategory: "Shirtful Qualitätskontrolle"

  # Registry Einträge für Qualitätskontrolle
  include: null

  # Installer-spezifische Konfiguration für Qualitätskontrolle
  installerHeader: "RFID QR Qualitätskontrolle - Doppel-Scan-System"
  installerSidebar: "build/installer-sidebar.bmp"

  # Custom NSIS-Defines für Qualitätskontrolle
  defines:
    QUALITY_CONTROL_MODE: "true"
    DOUBLE_SCAN_ENABLED: "true"
    AUTO_SESSION_RESTART: "true"
    MULTI_USER_SUPPORT: "true"

# =============================================================================
# PLATTFORM-SPEZIFISCHE BUILDS
# =============================================================================

# macOS (optional für zukünftige Cross-Platform Versionen)
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: "build/icon.icns"
  category: public.app-category.business
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: null
  entitlementsInherit: null

  # macOS-spezifische Qualitätskontrolle-Metadaten
  extendInfo:
    QualityControlSystem: true
    DoubleScanLogic: true
    MultiUserSupport: true

# macOS DMG
dmg:
  title: "${productName} ${version}"
  icon: "build/volume.icns"
  background: "build/background-qc.png"
  window:
    width: 540
    height: 380
  contents:
    - x: 140
      y: 225
      type: file
    - x: 400
      y: 225
      type: link
      path: "/Applications"

# Linux (optional)
linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  icon: "build/icon.png"
  category: Office
  synopsis: "RFID QR Qualitätskontrolle System mit Doppel-Scan-Logik"
  description: "Desktop-Anwendung für RFID-basierte Zeiterfassung und QR-Code Qualitätskontrolle mit präzisem Doppel-Scan-System"

  # Linux-spezifische Qualitätskontrolle-Konfiguration
  desktop:
    Keywords: "qualitätskontrolle;rfid;qr-code;doppel-scan;shirtful"
    Categories: "Office;Quality;Manufacturing"

# Linux AppImage
appImage:
  artifactName: "${productName}-${version}.${ext}"

# Debian Package
deb:
  priority: optional
  depends:
    - gconf2
    - gconf-service
    - libnotify4
    - libappindicator1
    - libxtst6
    - libnss3
  packageCategory: "Quality Control"

# =============================================================================
# QUALITÄTSKONTROLLE-SPEZIFISCHE KONFIGURATION
# =============================================================================

# Build-Zeit-Konfiguration für Qualitätskontrolle-Features
buildVersion: "1.0.0-qc"
buildDependenciesFromSource: false
npmRebuild: true
nodeGypRebuild: false

# Metadaten für Qualitätskontrolle
metadata:
  author:
    name: "Shirtful GmbH"
    email: "support@shirtful.com"
  homepage: "https://www.shirtful.com/qualitaetskontrolle"
  description: "RFID-basierte Qualitätskontrolle mit Doppel-Scan-System für moderne Produktionsbetriebe"
  keywords:
    - "qualitätskontrolle"
    - "quality-control"
    - "rfid"
    - "qr-code"
    - "doppel-scan"
    - "double-scan"
    - "zeiterfassung"
    - "karton-bearbeitung"
    - "multi-user"
    - "shirtful"

# Qualitätskontrolle-spezifische Ressourcen
extraFiles:
  - from: "assets/qc-icons"
    to: "resources/qc-icons"
    filter:
      - "**/*.png"
      - "**/*.ico"
      - "**/*.svg"
  - from: "assets/audio"
    to: "resources/audio"
    filter:
      - "success-*.wav"
      - "error-*.wav"
      - "duplicate-*.wav"

# =============================================================================
# ENTWICKLUNG & DEBUGGING
# =============================================================================

# Debugging für Qualitätskontrolle
afterSign: null
afterAllArtifactBuild: null

# Development-spezifische Konfiguration
extends: null

# Environment-spezifische Builds
buildEnvironment:
  QUALITY_CONTROL_BUILD: "true"
  DOUBLE_SCAN_SYSTEM: "true"
  AUTO_SESSION_RESTART: "true"

# Qualitätskontrolle-spezifische Build-Hooks
beforeBuild: "scripts/qc-prebuild.js"
afterBuild: "scripts/qc-postbuild.js"

# Package-spezifische Konfiguration
pkg:
  scripts:
    - "db/**/*.js"
    - "rfid/**/*.js"
    - "renderer/**/*.js"

# =============================================================================
# SIGNIERUNG & VERTEILUNG (OPTIONAL)
# =============================================================================

# Code-Signierung (falls verfügbar)
forceCodeSigning: false

# Verteilungs-Konfiguration
snap:
  synopsis: "RFID QR Qualitätskontrolle"
  description: |
    RFID QR Qualitätskontrolle mit Doppel-Scan-System für präzise 
    Karton-Bearbeitung in Produktionsumgebungen.
    
    Features:
    - Doppel-Scan-System (Ein-/Ausgang)
    - Automatische Session-Verwaltung
    - Multi-User-Parallelbetrieb
    - Real-Time Qualitätskontrolle-Dashboard
    - Intelligente Duplikat-Erkennung
  grade: stable
  confinement: strict

# Portable-Version Konfiguration
portable:
  artifactName: "${productName}-${version}-Portable.${ext}"

# Squirrel.Windows Konfiguration (falls gewünscht)
squirrelWindows:
  iconUrl: "https://www.shirtful.com/assets/qc-icon.ico"
  loadingGif: "build/installer-loading.gif"
  setupIcon: "build/setup-qc.ico"

# =============================================================================
# ERWEITERTE KONFIGURATION
# =============================================================================

# Kompression und Optimierung
nsis:
  differentialPackage: false

# Protokollierung
detectUpdateChannel: true

# Remote-Konfiguration für Updates
releaseInfo:
  releaseNotes: |
    RFID QR Qualitätskontrolle v1.0.0
    
    Neue Features:
    - Doppel-Scan-System für präzise Karton-Bearbeitung
    - Automatische Session-Verwaltung mit Neustart
    - Multi-User-Parallelbetrieb
    - Real-Time Qualitätskontrolle-Dashboard
    - Intelligente Duplikat-Erkennung
    - Bearbeitungszeit-Tracking pro Karton
    
    Optimierungen:
    - Verbesserte QR-Scanner-Performance
    - Stabilere RFID-Integration
    - Erweiterte Fehlerbehandlung
    - GPU-optimierte Rendering-Pipeline
  releaseName: "Qualitätskontrolle v1.0.0 - Doppel-Scan-System"
  releaseDate: "2024-12-16"

# Qualitätskontrolle-spezifische Anpassungen
extraMetadata:
  qualityControl:
    systemType: "double-scan"
    version: "1.0.0"
    features:
      - "doppel-scan-logik"
      - "auto-session-restart"
      - "multi-user-support"
      - "real-time-dashboard"
      - "duplicate-detection"
      - "processing-time-tracking"
    compatibility:
      wareneinlagerung: "1.x.x"
      database: "mssql-2019+"
      windows: "10+"